<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>클릭으로 배우는 세포분열</title>
<style>
  :root{
    --ink:#1e293b;          /* 선명한 글자 */
    --blue:#1d4ed8;         /* 부계 염색체 */
    --red:#dc2626;          /* 모계 염색체 */
    --line:#94a3b8;
    --card:#ffffff;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Malgun Gothic","맑은 고딕",system-ui,sans-serif;
    color:var(--ink);
    background:linear-gradient(135deg,#fde9f0 0%,#e6f0fb 45%,#e9f7ef 100%);
    min-height:100vh;
    padding:18px 14px 40px;
  }
  .wrap{max-width:1000px;margin:0 auto;}
  h1{
    text-align:center;font-size:26px;margin:6px 0 2px;letter-spacing:-.5px;
  }
  .sub{text-align:center;color:#475569;font-size:14px;margin:0 0 16px;}
  /* 탭 */
  .tabs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:14px;}
  .tab{
    border:none;cursor:pointer;padding:10px 16px;border-radius:999px;
    font-size:14px;font-weight:700;background:#ffffffcc;color:#334155;
    box-shadow:0 1px 3px rgba(0,0,0,.08);transition:.15s;
  }
  .tab:hover{transform:translateY(-1px);}
  .tab.active{background:var(--ink);color:#fff;box-shadow:0 4px 12px rgba(30,41,59,.25);}
  /* 스테이지 */
  .stage{
    background:rgba(255,255,255,.55);
    border:1px solid #ffffffaa;
    border-radius:20px;padding:14px;
    box-shadow:0 10px 30px rgba(80,90,130,.12);
    display:grid;grid-template-columns:1.35fr 1fr;gap:14px;
  }
  @media(max-width:820px){.stage{grid-template-columns:1fr;}}
  .canvas-box{
    background:var(--card);border-radius:16px;overflow:hidden;
    box-shadow:inset 0 0 0 1px #eef2f7;position:relative;
  }
  svg{display:block;width:100%;height:auto;cursor:pointer;}
  .clickhint{
    position:absolute;left:50%;bottom:10px;transform:translateX(-50%);
    background:#1e293bdd;color:#fff;font-size:12px;padding:5px 12px;border-radius:999px;
    pointer-events:none;animation:pulse 1.6s infinite;
  }
  @keyframes pulse{0%,100%{opacity:.55;}50%{opacity:1;}}
  /* 설명 패널 */
  .panel{display:flex;flex-direction:column;}
  .phasebar{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .phase{
    font-size:20px;font-weight:800;color:var(--ink);
  }
  .stepno{
    margin-left:auto;font-size:12px;color:#64748b;font-weight:700;
    background:#fff;padding:4px 10px;border-radius:999px;box-shadow:0 1px 2px rgba(0,0,0,.06);
  }
  .desc{
    background:#fff;border-radius:14px;padding:14px 16px;font-size:15px;line-height:1.7;
    box-shadow:0 1px 3px rgba(0,0,0,.06);min-height:120px;flex:1;
  }
  .desc b{color:#7c2d12;}
  .desc .hl-blue{color:var(--blue);font-weight:800;}
  .desc .hl-red{color:var(--red);font-weight:800;}
  .stats{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap;}
  .stat{
    background:#fff;border-radius:12px;padding:8px 12px;flex:1;text-align:center;
    box-shadow:0 1px 3px rgba(0,0,0,.06);min-width:90px;
  }
  .stat .k{font-size:11px;color:#64748b;font-weight:700;}
  .stat .v{font-size:18px;font-weight:800;margin-top:2px;}
  /* 컨트롤 */
  .controls{display:flex;gap:8px;margin-top:4px;}
  .btn{
    flex:1;border:none;cursor:pointer;padding:12px;border-radius:12px;font-size:15px;font-weight:800;
    transition:.15s;
  }
  .btn:hover{transform:translateY(-1px);}
  .btn.next{background:var(--ink);color:#fff;}
  .btn.prev{background:#fff;color:#334155;box-shadow:inset 0 0 0 1px #e2e8f0;}
  .btn.reset{background:#fff;color:#334155;flex:0 0 auto;box-shadow:inset 0 0 0 1px #e2e8f0;}
  .btn:disabled{opacity:.4;cursor:default;transform:none;}
  .dots{display:flex;gap:6px;justify-content:center;margin-top:12px;flex-wrap:wrap;}
  .dot{width:9px;height:9px;border-radius:50%;background:#cbd5e1;transition:.2s;}
  .dot.on{background:var(--ink);transform:scale(1.25);}
  .dot.done{background:#94a3b8;}
  /* 범례 */
  .legend{
    display:flex;flex-wrap:wrap;gap:10px 18px;justify-content:center;
    margin-top:16px;font-size:13px;color:#334155;
  }
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .swatch{width:14px;height:14px;border-radius:4px;display:inline-block;}
  /* SVG 요소 트랜지션 */
  .chrom{transition:transform .85s cubic-bezier(.5,.05,.3,1),opacity .45s;transform-origin:0 0;}
  .membrane,.nucleus{transition:all .7s cubic-bezier(.5,.05,.3,1),opacity .5s;}
  .celllabel{transition:opacity .5s;font-weight:800;}
  
  /* 푸터 스타일 지정 */
  footer{
    text-align:center;
    margin-top:32px;
    font-size:12px;
    color:#64748b;
    letter-spacing:0.5px;
  }
</style>
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">
<div class="wrap">
  <h1>🔬 클릭으로 배우는 세포분열</h1>
  <p class="sub">그림을 클릭하거나 <b>다음 ▶</b> 버튼을 누를 때마다 한 단계씩 진행됩니다.</p>

  <div class="tabs" id="tabs"></div>

  <div class="stage">
    <div class="canvas-box">
      <svg id="svg" viewBox="0 0 660 540" xmlns="http://www.w3.org/2000/svg">
        <g id="membranes"></g>
        <g id="nuclei"></g>
        <g id="spindle"></g>
        <g id="labels"></g>
        <g id="chroms"></g>
      </svg>
      <div class="clickhint">👆 클릭하면 다음 단계</div>
    </div>

    <div class="panel">
      <div class="phasebar">
        <span class="phase" id="phase">단계</span>
        <span class="stepno" id="stepno">1 / 1</span>
      </div>
      <div class="stats">
        <div class="stat"><div class="k">DNA 상대량</div><div class="v" id="s-dna">–</div></div>
        <div class="stat"><div class="k">세포 1개당 염색체 수</div><div class="v" id="s-chr">–</div></div>
        <div class="stat"><div class="k">세포 수</div><div class="v" id="s-cell">–</div></div>
      </div>
      <div class="desc" id="desc"></div>
      <div class="controls" style="margin-top:12px;">
        <button class="btn prev" id="prev">◀ 이전</button>
        <button class="btn next" id="next">다음 ▶</button>
        <button class="btn reset" id="reset">↺ 처음</button>
      </div>
      <div class="dots" id="dots"></div>
    </div>
  </div>

  <div class="legend">
    <span><span class="swatch" style="background:#1d4ed8"></span>부계 염색체(아버지)</span>
    <span><span class="swatch" style="background:#dc2626"></span>모계 염색체(어머니)</span>
    <span>긴/짧은 막대 = 서로 다른 <b>상동염색체</b></span>
    <span>✕자 모양 = 복제된 염색체(<b>염색 분체</b> 2개)</span>
    <span>ㅣ막대 = 염색 분체 1개</span>
  </div>

  <footer>
    <p>© 2026. All Rights Reserved (무단 전재 및 재배포 금지)</p>
  </footer>
</div>

<script>
/* ===== 염색체 유닛 정의 (색=부모, 길이=상동염색체 종류) ===== */
const B="#1d4ed8", R="#dc2626";
const UNIT={
  LP:{size:"long",  c:B}, LM:{size:"long",  c:R},
  SP:{size:"short", c:B}, SM:{size:"short", c:R},
  LP2:{size:"long", c:B}, LM2:{size:"long", c:R},
  SP2:{size:"short",c:B}, SM2:{size:"short",c:R},
};
const UIDS=Object.keys(UNIT);

/* 염색체 SVG 내부 그리기 */
function chromInner(u,form){
  const len = u.size==="long"?112:66;
  const h=len/2, w=len*0.17, col=u.c;
  const cent=`<circle cx="0" cy="0" r="7.5" fill="#fff" stroke="${col}" stroke-width="4"/>`;
  if(form==="thin"){ // 간기 염색사(풀어진 실 모양)
    return `<path d="M0 ${-h} Q ${w*1.6} ${-h/2} 0 0 Q ${-w*1.6} ${h/2} 0 ${h}"
             fill="none" stroke="${col}" stroke-width="5" stroke-linecap="round" opacity="0.85"/>`;
  }
  if(form==="bar"){ // 염색 분체 1개
    return `<line x1="0" y1="${-h}" x2="0" y2="${h}" stroke="${col}" stroke-width="13" stroke-linecap="round"/>`+cent;
  }
  // X: 복제된 염색체 (염색 분체 2개)
  return `<line x1="${-w}" y1="${-h}" x2="${w}" y2="${h}" stroke="${col}" stroke-width="12" stroke-linecap="round"/>`
        +`<line x1="${w}" y1="${-h}" x2="${-w}" y2="${h}" stroke="${col}" stroke-width="12" stroke-linecap="round"/>`+cent;
}

/* ===== 좌표 상수 ===== */
const CX=330;

/* 편의: 유닛배치 표기 [x,y,form,angle,hidden] */
function P(x,y,f,a,hid){return {x,y,f:f||"X",a:a||0,hid:!!hid};}

/* ===== 공통 시작 단계(간기) ===== */
const interG1={
  phase:"간기 (G₁기)", dna:"1", chr:"4 (2n)", cell:"1",
  cells:[[CX,260,205,150]], nuclei:[[CX,260,150,112]],
  chroms:{LP:P(268,215,"thin",20),LM:P(392,300,"thin",-25),SP:P(300,300,"thin",70),SM:P(378,220,"thin",115)},
  desc:`세포가 분열을 준비하는 <b>간기</b>입니다. 핵막 안에 <span class="hl-blue">부계</span>·<span class="hl-red">모계</span>에서 온 상동염색체가 <b>실처럼 풀어진 염색사</b> 상태로 들어 있어요. (2n = 4)`
};
const interS={
  phase:"간기 (S기) — DNA 복제", dna:"2", chr:"4 (2n)", cell:"1",
  cells:[[CX,260,205,150]], nuclei:[[CX,260,150,112]],
  chroms:{LP:P(268,215,"X",20),LM:P(392,300,"X",-25),SP:P(300,300,"X",70),SM:P(378,220,"X",115)},
  desc:`<b>S기</b>에서 <b>DNA가 복제</b>됩니다. 각 염색체는 똑같은 <b>염색 분체 2개</b>가 붙은 <b>✕자 모양</b>이 돼요. DNA 양이 <b>2배</b>로 늘었습니다.`
};

/* 세포 4구석 좌표(감수2분열 결과) */
const TL=[210,165],TR=[452,165],BL=[210,378],BR=[452,378];

/* ======================================================
   MODE 1 : 체세포분열
====================================================== */
const mitosis=[
  interG1,
  interS,
  { phase:"분열기 — 전기", dna:"2", chr:"4 (2n)", cell:"1",
    cells:[[CX,260,205,150]],
    chroms:{LP:P(250,210,"X",12),LM:P(408,232,"X",-12),SP:P(292,315,"X",0),SM:P(400,312,"X",0)},
    desc:`<b>전기</b>: <b>핵막과 인이 사라지고</b> 염색사가 굵게 <b>응축</b>되어 ✕자 염색체가 뚜렷이 보입니다. 방추사가 만들어지기 시작해요.` },
  { phase:"분열기 — 중기", dna:"2", chr:"4 (2n)", cell:"1", poles:[[CX,105],[CX,415]],
    cells:[[CX,260,205,150]],
    chroms:{LP:P(200,260,"X"),LM:P(287,260,"X"),SP:P(373,260,"X"),SM:P(460,260,"X"),
            LP2:P(200,260,"X",0,1),LM2:P(287,260,"X",0,1),SP2:P(373,260,"X",0,1),SM2:P(460,260,"X",0,1)},
    desc:`<b>중기</b>: 염색체가 세포 가운데 <b>적도판에 한 줄로 배열</b>됩니다. 방추사가 각 염색체의 동원체에 붙어요. (염색체 수를 세기 가장 좋은 시기!)` },
  { phase:"분열기 — 후기", dna:"2", chr:"4 (2n)", cell:"1", poles:[[CX,105],[CX,415]],
    cells:[[CX,260,205,150]],
    chroms:{LP:P(200,168,"bar"),LP2:P(200,352,"bar"),LM:P(287,168,"bar"),LM2:P(287,352,"bar"),
            SP:P(373,168,"bar"),SP2:P(373,352,"bar"),SM:P(460,168,"bar"),SM2:P(460,352,"bar")},
    desc:`<b>후기</b>: <b>염색 분체가 분리</b>되어 방추사에 끌려 양극으로 이동합니다. ✕자가 갈라져 막대(ㅣ) 모양 하나씩이 되었어요.` },
  { phase:"분열기 — 말기", dna:"1", chr:"4 (2n)", cell:"2",
    cells:[[CX,168,180,95],[CX,352,180,95]], nuclei:[[CX,168,150,72],[CX,352,150,72]],
    chroms:{LP:P(258,168,"thin"),LM:P(312,168,"thin"),SP:P(360,168,"thin"),SM:P(408,168,"thin"),
            LP2:P(258,352,"thin"),LM2:P(312,352,"thin"),SP2:P(360,352,"thin"),SM2:P(408,352,"thin")},
    desc:`<b>말기</b>: 양극에 <b>핵막이 다시 생기고</b> 염색체는 풀어집니다. <b>세포질 분열</b>이 일어나 세포가 둘로 나뉘어요.` },
  { phase:"딸세포 완성", dna:"1", chr:"4 (2n)", cell:"2",
    cells:[[CX,150,168,88],[CX,378,168,88]], nuclei:[[CX,150,140,66],[CX,378,140,66]],
    labels:[[CX,150,"2n = 4"],[CX,378,"2n = 4"]],
    chroms:{LP:P(262,150,"thin"),LM:P(316,150,"thin"),SP:P(360,150,"thin"),SM:P(404,150,"thin"),
            LP2:P(262,378,"thin"),LM2:P(316,378,"thin"),SP2:P(360,378,"thin"),SM2:P(404,378,"thin")},
    desc:`✅ <b>결과</b>: 모세포(2n=4)와 <b>염색체 수·구성이 똑같은 딸세포 2개</b>가 생겼습니다. 몸을 자라게 하고 상처를 아물게 하는 분열이에요.` },
];

/* ======================================================
   MODE 2 : 감수분열 (1분열 + 2분열)
====================================================== */
const meiosis=[
  interG1,
  interS,
  { phase:"감수 1분열 — 전기", dna:"2", chr:"4 (2n)", cell:"1",
    cells:[[CX,260,205,150]],
    chroms:{LP:P(255,232,"X"),LM:P(255,288,"X"),SP:P(410,232,"X"),SM:P(410,288,"X")},
    desc:`<b>감수 1분열 전기</b>: 핵막이 사라지고, <b>상동염색체끼리 접합</b>하여 <b>2가 염색체(4분체)</b>를 만듭니다. <span class="hl-blue">긴 파랑</span>·<span class="hl-red">긴 빨강</span>이 짝, <span class="hl-blue">짧은 파랑</span>·<span class="hl-red">짧은 빨강</span>이 짝이에요.` },
  { phase:"감수 1분열 — 중기", dna:"2", chr:"4 (2n)", cell:"1", poles:[[CX,105],[CX,415]],
    cells:[[CX,260,205,150]],
    chroms:{LP:P(262,228,"X"),LM:P(262,292,"X"),SP:P(398,228,"X"),SM:P(398,292,"X")},
    desc:`<b>중기</b>: <b>2가 염색체가 적도판에 배열</b>됩니다. 상동염색체가 위·아래로 마주 보고, 방추사가 붙어요.` },
  { phase:"감수 1분열 — 후기", dna:"2", chr:"2 (n)", cell:"1", poles:[[CX,105],[CX,415]],
    cells:[[CX,260,205,150]],
    chroms:{LP:P(262,170,"X"),SP:P(398,170,"X"),LM:P(262,350,"X"),SM:P(398,350,"X")},
    desc:`<b>후기</b>: <b>상동염색체가 분리</b>되어 양극으로 갑니다. ⚠️ 이때 <b>염색 분체는 아직 붙어 있어요</b>(✕자 유지). 그래서 염색체 수가 절반(n)으로 줄어듭니다.` },
  { phase:"감수 1분열 — 완료", dna:"2", chr:"2 (n)", cell:"2",
    cells:[[CX,168,180,95],[CX,352,180,95]],
    labels:[[CX,168,"n = 2"],[CX,352,"n = 2"]],
    chroms:{LP:P(278,168,"X"),SP:P(384,168,"X"),LM:P(278,352,"X"),SM:P(384,352,"X")},
    desc:`세포질 분열로 <b>딸세포 2개</b>가 생겼습니다. 염색체 수는 절반(<b>n = 2</b>)이지만, 각 염색체는 아직 <b>염색 분체 2개</b>(✕자)로 되어 있어요.` },
  { phase:"감수 2분열 — 중기", dna:"2", chr:"2 (n)", cell:"2",
    poles:[[210,168],[452,168],[210,352],[452,352]],
    cells:[[CX,168,175,92],[CX,352,175,92]],
    chroms:{LP:P(CX,140,"X",90),SP:P(CX,196,"X",90),LP2:P(CX,140,"X",90,1),SP2:P(CX,196,"X",90,1),
            LM:P(CX,324,"X",90),SM:P(CX,380,"X",90),LM2:P(CX,324,"X",90,1),SM2:P(CX,380,"X",90,1)},
    desc:`<b>감수 2분열</b>이 시작됩니다. ⚡ <b>DNA 복제 없이</b> 곧바로 진행돼요. 각 세포에서 ✕자 염색체가 <b>적도판에 배열</b>됩니다.` },
  { phase:"감수 2분열 — 후기", dna:"1", chr:"2 (n)", cell:"2",
    poles:[[210,168],[452,168],[210,352],[452,352]],
    cells:[[CX,168,175,92],[CX,352,175,92]],
    chroms:{LP:P(250,140,"bar",90),LP2:P(410,140,"bar",90),SP:P(250,196,"bar",90),SP2:P(410,196,"bar",90),
            LM:P(250,324,"bar",90),LM2:P(410,324,"bar",90),SM:P(250,380,"bar",90),SM2:P(410,380,"bar",90)},
    desc:`<b>후기</b>: 드디어 <b>염색 분체가 분리</b>되어 양쪽으로 이동합니다. ✕자가 갈라져 막대(ㅣ) 하나씩이 되었어요.` },
  { phase:"딸세포(생식세포) 완성", dna:"1", chr:"2 (n)", cell:"4",
    cells:[[TL[0],TL[1],100,84],[TR[0],TR[1],100,84],[BL[0],BL[1],100,84],[BR[0],BR[1],100,84]],
    labels:[[TL[0],TL[1],"n = 2"],[TR[0],TR[1],"n = 2"],[BL[0],BL[1],"n = 2"],[BR[0],BR[1],"n = 2"]],
    chroms:{LP:P(TL[0]-18,TL[1],"thin"),SP:P(TL[0]+22,TL[1],"thin"),
            LP2:P(TR[0]-18,TR[1],"thin"),SP2:P(TR[0]+22,TR[1],"thin"),
            LM:P(BL[0]-18,BL[1],"thin"),SM:P(BL[0]+22,BL[1],"thin"),
            LM2:P(BR[0]-18,BR[1],"thin"),SM2:P(BR[0]+22,BR[1],"thin")},
    desc:`✅ <b>결과</b>: 염색체 수가 절반(<b>n=2</b>)인 <b>생식세포 4개</b>가 만들어졌습니다. 상동염색체가 무작위로 나뉘어 <b>유전적으로 다양한</b> 생식세포가 생겨요.` },
];

/* ======================================================
   MODE 3 : 감수 1분열에서 비분리
   → 긴 염색체 쌍(LP·LM)이 분리되지 않음
====================================================== */
const nondis1=[
  interG1,
  interS,
  meiosis[2], // 전기 (2가 염색체)
  meiosis[3], // 중기
  { phase:"감수 1분열 후기 — ⚠️ 비분리", dna:"2", chr:"3 / 1", cell:"1", poles:[[CX,105],[CX,415]],
    cells:[[CX,260,205,150]],
    chroms:{LP:P(240,175,"X"),LM:P(300,175,"X"),SP:P(400,175,"X"),SM:P(400,350,"X")},
    desc:`⚠️ <b>염색체 비분리 발생!</b> <b>긴 상동염색체(<span class="hl-blue">파랑</span>·<span class="hl-red">빨강</span>)가 분리되지 못하고</b> 함께 위쪽으로 갑니다. 짧은 염색체는 정상적으로 갈라져요. → 위 <b>3개</b> / 아래 <b>1개</b>` },
  { phase:"감수 1분열 완료 — 비정상", dna:"2", chr:"n+1 / n−1", cell:"2",
    cells:[[CX,168,180,95],[CX,352,180,95]],
    labels:[[CX,168,"n+1 = 3"],[CX,352,"n−1 = 1"]],
    chroms:{LP:P(272,168,"X"),LM:P(330,168,"X"),SP:P(388,168,"X"),SM:P(CX,352,"X")},
    desc:`두 딸세포가 <b>비정상</b>이 됩니다. 위 세포는 염색체가 하나 많은 <b>n+1(3개)</b>, 아래 세포는 하나 부족한 <b>n−1(1개)</b>.` },
  { phase:"감수 2분열 후기", dna:"1", chr:"n+1 / n−1", cell:"2",
    poles:[[210,168],[452,168],[210,352],[452,352]],
    cells:[[CX,168,175,92],[CX,352,175,92]],
    chroms:{LP:P(250,138,"bar",90),LP2:P(410,138,"bar",90),LM:P(250,168,"bar",90),LM2:P(410,168,"bar",90),
            SP:P(250,198,"bar",90),SP2:P(410,198,"bar",90),
            SM:P(250,352,"bar",90),SM2:P(410,352,"bar",90)},
    desc:`감수 2분열에서는 <b>염색 분체가 정상적으로 분리</b>됩니다. 하지만 이미 1분열에서 잘못 나뉘었기 때문에 모든 딸세포가 비정상이에요.` },
  { phase:"결과 — 모두 비정상", dna:"1", chr:"n+1·n+1·n−1·n−1", cell:"4",
    cells:[[TL[0],TL[1],100,84],[TR[0],TR[1],100,84],[BL[0],BL[1],100,84],[BR[0],BR[1],100,84]],
    labels:[[TL[0],TL[1],"n+1"],[TR[0],TR[1],"n+1"],[BL[0],BL[1],"n−1"],[BR[0],BR[1],"n−1"]],
    chroms:{LP:P(TL[0]-24,TL[1],"thin"),LM:P(TL[0]+4,TL[1],"thin"),SP:P(TL[0]+30,TL[1],"thin"),
            LP2:P(TR[0]-24,TR[1],"thin"),LM2:P(TR[0]+4,TR[1],"thin"),SP2:P(TR[0]+30,TR[1],"thin"),
            SM:P(BL[0],BL[1],"thin"),SM2:P(BR[0],BR[1],"thin")},
    desc:`✅ <b>감수 1분열 비분리 결과</b>: 딸세포 4개가 <b>모두 비정상</b>! <b>n+1, n+1, n−1, n−1</b>. 정상보다 염색체가 많거나 적은 생식세포만 생깁니다.` },
];

/* ======================================================
   MODE 4 : 감수 2분열에서 비분리
   → 1분열 정상, 위쪽 세포의 긴 염색 분체(LP)가 분리 안 됨
====================================================== */
const nondis2=[
  interG1,
  interS,
  meiosis[2], // 전기
  meiosis[3], // 중기
  meiosis[4], // 감수1분열 후기 (정상)
  meiosis[5], // 감수1분열 완료 (정상 n)
  { phase:"감수 2분열 중기", dna:"2", chr:"2 (n)", cell:"2",
    poles:[[210,168],[452,168],[210,352],[452,352]],
    cells:[[CX,168,175,92],[CX,352,175,92]],
    chroms:{LP:P(CX,140,"X",90),SP:P(CX,196,"X",90),LP2:P(CX,140,"X",90,1),SP2:P(CX,196,"X",90,1),
            LM:P(CX,324,"X",90),SM:P(CX,380,"X",90),LM2:P(CX,324,"X",90,1),SM2:P(CX,380,"X",90,1)},
    desc:`감수 1분열은 <b>정상적으로 끝나</b> 염색체 수가 절반(n=2)인 세포 2개가 되었습니다. 이제 감수 2분열이 시작돼요.` },
  { phase:"감수 2분열 후기 — ⚠️ 비분리", dna:"1", chr:"3 / 1 · n / n", cell:"2",
    poles:[[210,168],[452,168],[210,352],[452,352]],
    cells:[[CX,168,175,92],[CX,352,175,92]],
    chroms:{LP:P(250,138,"bar",90),LP2:P(250,168,"bar",90), /* 긴 분체 둘 다 왼쪽 */
            SP:P(250,198,"bar",90),SP2:P(410,196,"bar",90),
            LM:P(250,324,"bar",90),LM2:P(410,324,"bar",90),SM:P(250,380,"bar",90),SM2:P(410,380,"bar",90)},
    desc:`⚠️ <b>비분리 발생!</b> 위쪽 세포에서 <b>긴 염색체의 염색 분체 2개가 분리되지 못하고</b> 함께 왼쪽으로 갑니다. 아래쪽 세포는 정상적으로 분리돼요.` },
  { phase:"결과 — 절반만 정상", dna:"1", chr:"n+1·n−1·n·n", cell:"4",
    cells:[[TL[0],TL[1],100,84],[TR[0],TR[1],100,84],[BL[0],BL[1],100,84],[BR[0],BR[1],100,84]],
    labels:[[TL[0],TL[1],"n+1"],[TR[0],TR[1],"n−1"],[BL[0],BL[1],"n"],[BR[0],BR[1],"n"]],
    chroms:{LP:P(TL[0]-24,TL[1],"thin"),LP2:P(TL[0]+2,TL[1],"thin"),SP:P(TL[0]+28,TL[1],"thin"),
            SP2:P(TR[0],TR[1],"thin"),
            LM:P(BL[0]-18,BL[1],"thin"),SM:P(BL[0]+22,BL[1],"thin"),
            LM2:P(BR[0]-18,BR[1],"thin"),SM2:P(BR[0]+22,BR[1],"thin")},
    desc:`✅ <b>감수 2분열 비분리 결과</b>: <b>n+1, n−1, n, n</b>. 위쪽 세포에서 온 2개는 비정상, 아래쪽 세포에서 온 2개는 정상! <b>정상 : 비정상 = 1 : 1</b>로 나타납니다.` },
];

/* ===== 모드 목록 ===== */
const MODES=[
  {name:"🧬 체세포분열", steps:mitosis},
  {name:"🌸 감수분열", steps:meiosis},
  {name:"⚠️ 감수1분열 비분리", steps:nondis1},
  {name:"⚠️ 감수2분열 비분리", steps:nondis2},
];

/* ===== 렌더러 ===== */
const svg=document.getElementById("svg");
const gMem=document.getElementById("membranes");
const gNuc=document.getElementById("nuclei");
const gSpin=document.getElementById("spindle");
const gLab=document.getElementById("labels");
const gChr=document.getElementById("chroms");

// 염색체 풀 생성
const chromEls={};
UIDS.forEach(id=>{
  const g=document.createElementNS("http://www.w3.org/2000/svg","g");
  g.setAttribute("class","chrom");
  g.dataset.form="";
  g.style.opacity="0";
  gChr.appendChild(g);
  chromEls[id]=g;
});
// 세포막/핵막/라벨 풀 (넉넉히 4개)
const memEls=[],nucEls=[],labEls=[];
for(let i=0;i<4;i++){
  const m=document.createElementNS("http://www.w3.org/2000/svg","ellipse");
  m.setAttribute("class","membrane");
  m.setAttribute("fill","#fbfdff"); m.setAttribute("stroke","#334155"); m.setAttribute("stroke-width","3");
  m.style.opacity="0"; gMem.appendChild(m); memEls.push(m);

  const n=document.createElementNS("http://www.w3.org/2000/svg","ellipse");
  n.setAttribute("class","nucleus");
  n.setAttribute("fill","#eef4ff"); n.setAttribute("stroke","#64748b");
  n.setAttribute("stroke-width","2.5"); n.setAttribute("stroke-dasharray","6 5");
  n.style.opacity="0"; gNuc.appendChild(n); nucEls.push(n);

  const t=document.createElementNS("http://www.w3.org/2000/svg","text");
  t.setAttribute("class","celllabel"); t.setAttribute("text-anchor","middle");
  t.setAttribute("font-size","15"); t.setAttribute("fill","#0f172a");
  t.style.opacity="0"; gLab.appendChild(t); labEls.push(t);
}

let mode=0, step=0;

function renderStep(){
  const s=MODES[mode].steps[step];

  // 세포막
  const cells=s.cells||[];
  memEls.forEach((el,i)=>{
    if(cells[i]){
      const[cx,cy,rx,ry]=cells[i];
      el.setAttribute("cx",cx);el.setAttribute("cy",cy);
      el.setAttribute("rx",rx);el.setAttribute("ry",ry);
      el.style.opacity="1";
    } else el.style.opacity="0";
  });
  // 핵막
  const nuc=s.nuclei||[];
  nucEls.forEach((el,i)=>{
    if(nuc[i]){
      const[cx,cy,rx,ry]=nuc[i];
      el.setAttribute("cx",cx);el.setAttribute("cy",cy);
      el.setAttribute("rx",rx);el.setAttribute("ry",ry);
      el.style.opacity="1";
    } else el.style.opacity="0";
  });
  // 라벨
  const labs=s.labels||[];
  labEls.forEach((el,i)=>{
    if(labs[i]){
      const[x,y,txt]=labs[i];
      el.setAttribute("x",x);el.setAttribute("y",y+58);
      el.textContent=txt; el.style.opacity="1";
    } else el.style.opacity="0";
  });
  // 염색체
  const chr=s.chroms||{};
  UIDS.forEach(id=>{
    const el=chromEls[id], pos=chr[id];
    if(pos){
      if(el.dataset.form!==pos.f){
        el.innerHTML=chromInner(UNIT[id],pos.f);
        el.dataset.form=pos.f;
      }
      el.style.transform=`translate(${pos.x}px,${pos.y}px) rotate(${pos.a}deg)`;
      el.style.opacity=pos.hid?"0":"1";
      el.dataset.x=pos.x; el.dataset.y=pos.y;
    } else {
      el.style.opacity="0";
    }
  });
  // 방추사
  gSpin.innerHTML="";
  if(s.poles){
    s.poles.forEach(([px,py])=>{
      UIDS.forEach(id=>{
        const pos=chr[id];
        if(pos&&!pos.hid&&pos.f!=="thin"){
          // 가까운 극에만 연결
          const d=Math.hypot(px-pos.x,py-pos.y);
          if(d<190){
            const l=document.createElementNS("http://www.w3.org/2000/svg","line");
            l.setAttribute("x1",px);l.setAttribute("y1",py);
            l.setAttribute("x2",pos.x);l.setAttribute("y2",pos.y);
            l.setAttribute("stroke","#cbd5e1");l.setAttribute("stroke-width","2");
            gSpin.appendChild(l);
          }
        }
      });
      const dot=document.createElementNS("http://www.w3.org/2000/svg","circle");
      dot.setAttribute("cx",px);dot.setAttribute("cy",py);dot.setAttribute("r","4");
      dot.setAttribute("fill","#94a3b8");gSpin.appendChild(dot);
    });
  }

  // 패널 갱신
  document.getElementById("phase").textContent=s.phase;
  document.getElementById("desc").innerHTML=s.desc;
  document.getElementById("s-dna").textContent=s.dna;
  document.getElementById("s-chr").textContent=s.chr;
  document.getElementById("s-cell").textContent=s.cell;
  const total=MODES[mode].steps.length;
  document.getElementById("stepno").textContent=`${step+1} / ${total}`;
  document.getElementById("prev").disabled=(step===0);
  document.getElementById("next").disabled=(step===total-1);
  renderDots();
}

function renderDots(){
  const total=MODES[mode].steps.length;
  const box=document.getElementById("dots");
  box.innerHTML="";
  for(let i=0;i<total;i++){
    const d=document.createElement("div");
    d.className="dot"+(i===step?" on":(i<step?" done":""));
    box.appendChild(d);
  }
}

function renderTabs(){
  const box=document.getElementById("tabs");
  box.innerHTML="";
  MODES.forEach((m,i)=>{
    const b=document.createElement("button");
    b.className="tab"+(i===mode?" active":"");
    b.textContent=m.name;
    b.onclick=()=>{mode=i;step=0;
      // 모드 바뀌면 잔상 제거 위해 form 초기화
      UIDS.forEach(id=>chromEls[id].style.opacity="0");
      renderTabs();renderStep();};
    box.appendChild(b);
  });
}

function next(){const t=MODES[mode].steps.length; if(step<t-1){step++;renderStep();}}
function prev(){if(step>0){step--;renderStep();}}
function reset(){step=0;renderStep();}

document.getElementById("next").onclick=next;
document.getElementById("prev").onclick=prev;
document.getElementById("reset").onclick=reset;
svg.addEventListener("click",next);
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"||e.key===" ")next();
  if(e.key==="ArrowLeft")prev();
});

renderTabs();
renderStep();
</script>
</body>
</html>
